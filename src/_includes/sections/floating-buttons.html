{% from "components/icons.html" import icon %}

<!-- ============================================ -->
<!--                  STICKY ACTIONS              -->
<!-- ============================================ -->

<section id="floating-buttons" class="lg:hidden">
  <div aria-hidden="true" class="h-24 md:h-28"></div>

  <nav
    aria-label="Quick contact actions"
    class="pointer-events-none fixed inset-x-0 bottom-0 z-[9999] px-2 pb-[env(safe-area-inset-bottom)] sm:px-3 md:px-4"
  >
    <div
      class="pointer-events-auto mx-auto w-full max-w-4xl overflow-hidden rounded-t-[1.75rem] border-2 border-white/40 bg-white/80 shadow-[0_-14px_36px_rgba(15,23,42,0.18)] backdrop-blur-xl"
    >
      <div class="grid grid-cols-3 divide-x divide-slate-200/70 py-2!">
        <a
          href="tel:{{ client.phoneForTel }}"
          class="group flex min-w-0 flex-col items-center justify-center gap-2 px-3 py-3 text-center text-[var(--primary)] transition-colors duration-200 hover:text-[var(--secondary)] focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-[var(--primary)] focus-visible:ring-inset md:py-4"
        >
          {{ icon("phone", "h-7 w-7 shrink-0 md:h-8 md:w-8") }}
          <span
            class="text-[0.72rem] font-extrabold uppercase leading-[1.1] tracking-[0.01em] text-slate-700 transition-colors duration-200 group-hover:text-[var(--secondary)] md:text-xs"
          >
            Call Us Now
          </span>
        </a>

        <a
          href="sms:{{ client.phoneForTel }}"
          class="group flex min-w-0 flex-col items-center justify-center gap-2 px-3 py-3 text-center text-[var(--primary)] transition-colors duration-200 hover:text-[var(--secondary)] focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-[var(--primary)] focus-visible:ring-inset md:py-4"
        >
          {{ icon("message-circle-filled", "h-7 w-7 shrink-0 md:h-8 md:w-8") }}
          <span
            class="text-[0.72rem] font-extrabold uppercase leading-[1.1] tracking-[0.01em] text-slate-700 transition-colors duration-200 group-hover:text-[var(--secondary)] md:text-xs"
          >
            Txt Us
          </span>
        </a>

        <a
          href="{{ client.whatsappLink }}"
          target="_blank"
          rel="noopener noreferrer"
          class="group flex min-w-0 flex-col items-center justify-center gap-2 px-3 py-3 text-center text-[var(--primary)] transition-colors duration-200 hover:text-[var(--secondary)] focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-[var(--primary)] focus-visible:ring-inset md:py-4"
        >
          {{ icon("brand-whatsapp", "h-7 w-7 shrink-0 md:h-8 md:w-8") }}
          <span
            class="text-[0.72rem] font-extrabold uppercase leading-[1.1] tracking-[0.01em] text-slate-700 transition-colors duration-200 group-hover:text-[var(--secondary)] md:text-xs"
          >
            WhatsApp Us
          </span>
        </a>
      </div>
    </div>
  </nav>
</section>
